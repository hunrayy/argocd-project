name: "ci runner for web app"
on: 
  push:
    branches:
      - master
env:
  IMAGE_TAG: ${{ github.sha::7 }}
  IMAGE_NAME: simple_web_app
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
    - name:  checkout to root directory
      uses: actions/checkout@v6

    - name: echo image tag
      run: echo ${{ env.IMAGE_TAG }}

    - name: Build, Tag & Publish Image to DockerHub
      uses: dinushchathurya/build-tag-push-action@v1.2.1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        context: .
        file: Dockerfile
        repoOwner: ${{ secrets.DOCKER_USERNAME }}
        repository:  ${{ env.IMAGE_NAME }}
        tag: ${{ env.IMAGE_TAG }}