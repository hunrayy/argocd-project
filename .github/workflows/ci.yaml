name: "ci runner for web app"
on: 
  push:
    branches:
      - master
env:
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_NAME: simple_web_app
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
    - name:  checkout to root directory
      uses: actions/checkout@v6

    - name: echo image tag
      run: echo ${{ env.IMAGE_TAG }}

    - name: build a docker image using the dockerfile in root directory
      run: |
        sudo docker build -t ${{ secrets.DOCKER_USERSNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

    - name: Login to dockerhub
      run: |
        sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

    - name: push the image built to dockerhub
      run: |
        sudo docker push ${{ secrets.DOCKER_USERSNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

















    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}